apiVersion: v1
kind: Service
metadata:
  labels:
    app: nginx
  name: nginx
spec:
  ports:
    - name: http
      port: {{ .Values.env.httpPort | default 8080 }}
      targetPort: 80
    - name: https
      port: {{ .Values.env.httpsPort | default 8443 }}
      targetPort: 443
  selector:
    app: nginx
