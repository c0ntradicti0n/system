apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: integrator
  name: integrator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: integrator
  template:
    metadata:
      labels:
        app: integrator
    spec:
      containers:
        - env:
            - name: DEBUG
              value: "true"
            - name: DISABLE_TELEMETRY
              value: "true"
            - name: HAYSTACK_TELEMETRY_ENABLED
              value: "False"
            - name: HF_HUB_DISABLE_TELEMETRY
              value: "true"
            - name: NO_IMAGES
              value: "true"
            - name: PYDEV_DEBUG
              value: "true"
            - name: PYTHONIOENCODING
              value: utf-8
          envFrom:
            - configMapRef:
                name: env
          image: {{ .Values.images.registry }}integrator:latest
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          name: integrator
          ports:
            - containerPort: 5000
              protocol: TCP
          securityContext:
            runAsGroup: 1000
            runAsUser: 1000
          volumeMounts:
            - mountPath: /system
              name: system
            - mountPath: /chroma
              name: chroma
            - mountPath: /.cache
              name: cache-hf
            - mountPath: /.config
              name: cache-mpl
            - mountPath: /certs
              name: certs
              readOnly: true
          resources:
            limits:
              memory: 4Gi
      restartPolicy: Always
      volumes:
        - name: system
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.system.existingClaim | default "system-pvc" }}
        - name: chroma
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.chroma.existingClaim | default "chroma-pvc" }}
        - name: cache-hf
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.cacheHf.existingClaim | default "cache-hf-pvc" }}
        - name: cache-mpl
          persistentVolumeClaim:
            claimName: integrator-claim7
        - name: certs
          secret:
            secretName: {{ .Values.secrets.certs.existingSecret | default "certs-secret" }}